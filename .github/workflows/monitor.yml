name: HiyoLab Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 監視（内部で1分×5回）
    - cron: '0 0 * * *'    # 朝9時(JST) ハートビート
    - cron: '0 9 * * *'    # 夕方18時(JST) ハートビート
  workflow_dispatch:

jobs:
  # ハートビート専用ジョブ（朝9時・夕方18時のみ実行）
  heartbeat:
    if: github.event.schedule == '0 0 * * *' || github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: ハートビート通知
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'EOF'
          import os, requests
          schedule = os.environ["SCHEDULE"]
          label = "朝9時" if schedule == "0 0 * * *" else "夕方18時"
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}", "Content-Type": "application/json"},
              json={"to": os.environ["LINE_USER_ID"], "messages": [{"type": "text", "text": f"【{label} 定時報告】ひよりとーく を正常に監視しています。"}]},
              timeout=10
          )
          print(f"ハートビート送信（{label}）")
          EOF

  # 通常監視ジョブ（5分ごと＋手動実行）
  check:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor (1分×5回ループ)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for i in 1 2 3 4 5; do
            echo "=== チェック $i/5 ==="
            python monitor_gha.py || echo "スクリプトエラー（継続）"
            if [ $i -lt 5 ]; then
              sleep 60
            fi
          done

          git add last_comment_id.txt
          if ! git diff --cached --quiet; then
            git commit -m "update last_comment_id"
            git push
          fi

      - name: エラー通知
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}", "Content-Type": "application/json"},
              json={"to": os.environ["LINE_USER_ID"], "messages": [{"type": "text", "text": "【エラー】ひよりとーく の監視でエラーが発生しました。\nhttps://github.com/ranran1129/hiyolab-monitor/actions"}]},
              timeout=10
          )
          EOF
