name: HiyoLab Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごとに起動（内部で1分×5回チェック）
    - cron: '0 0 * * *'    # 毎日0時(UTC)=日本時間9時にハートビート通知
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor (1分×5回ループ)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          HEARTBEAT: ${{ github.event.schedule == '0 0 * * *' && 'true' || 'false' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for i in 1 2 3 4 5; do
            echo "=== チェック $i/5 ==="
            python monitor_gha.py || echo "スクリプトエラー（継続）"
            if [ $i -lt 5 ]; then
              sleep 60
            fi
          done

          git add last_comment_id.txt
          if ! git diff --cached --quiet; then
            git commit -m "update last_comment_id"
            git push
          else
            echo "コミットなし（変化なし）"
          fi
