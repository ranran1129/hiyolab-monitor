name: HiyoLab Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # バックアップ用（cron-job.orgがメイン）
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'トリガー元（cronjob/manual）'
        required: false
        default: 'manual'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          python monitor_gha.py || echo "スクリプトエラー"
          git add last_comment_id.txt last_heartbeat.txt
          if ! git diff --cached --quiet; then
            git commit -m "update state"
            git push
          fi

      - name: エラー通知
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}", "Content-Type": "application/json"},
              json={"to": os.environ["LINE_USER_ID"], "messages": [{"type": "text", "text": "【エラー】ひよりとーく の監視でエラーが発生しました。\nhttps://github.com/ranran1129/hiyolab-monitor/actions"}]},
              timeout=10
          )
          EOF
